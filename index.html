<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Система таблиц</title>
  <style>
    /* Основные стили страницы */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Стили для кнопок управления на главной */
    .button-container {
      display: flex;
      gap: 15px;
    }

    .btn-primary {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-primary:hover { background-color: #218838; }

    /* Вторая кнопка, которая теперь открывает модальное окно */
    .btn-secondary {
      background-color: #6c757d;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-secondary:hover { background-color: #5a6268; }


    /* --- МОДАЛЬНОЕ ОКНО (ПОП-АП) --- */
    
    /* Задний полупрозрачный фон */
    .modal {
      display: none; /* Изначально скрыто */
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(3px);
    }

    /* Центрированное белое окошко */
    .modal-content {
      background-color: #ffffff;
      margin: 12% auto;
      padding: 24px;
      border-radius: 10px;
      width: 90%;
      max-width: 460px;
      box-shadow: 0 5px 25px rgba(0, 0, 0, 0.2);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    /* Шапка окна */
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #f1f3f5;
      padding-bottom: 12px;
      margin-bottom: 15px;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 20px;
      color: #212529;
    }

    /* Кнопка закрытия (крестик) */
    .close-button {
      cursor: pointer;
      font-size: 28px;
      color: #adb5bd;
      line-height: 1;
      transition: color 0.15s;
    }
    .close-button:hover { color: #495057; }

    /* Ограниченная область с прокруткой для таблиц */
    .tables-list {
      max-height: 280px; /* Высота, при превышении которой включится скролл */
      overflow-y: auto;  /* Вертикальный скролл */
      padding-right: 6px;
    }

    /* Стилизация полосы прокрутки (скроллбара) */
    .tables-list::-webkit-scrollbar {
      width: 6px;
    }
    .tables-list::-webkit-scrollbar-track {
      background: #f1f3f5;
      border-radius: 4px;
    }
    .tables-list::-webkit-scrollbar-thumb {
      background: #dee2e6;
      border-radius: 4px;
    }
    .tables-list::-webkit-scrollbar-thumb:hover {
      background: #ced4da;
    }

    /* Строка таблицы в списке */
    .table-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 8px;
      border-bottom: 1px solid #f1f3f5;
      transition: background-color 0.2s;
    }
    .table-item:hover {
      background-color: #f8f9fa;
    }

    .table-name {
      font-size: 16px;
      font-weight: 500;
      color: #343a40;
    }

    /* Синяя кнопка «Просмотреть» справа */
    .btn-view {
      background-color: #007bff;
      color: white;
      padding: 7px 16px;
      text-decoration: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 500;
      transition: background-color 0.15s, transform 0.1s;
    }
    .btn-view:hover {
      background-color: #0056b3;
    }
    .btn-view:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <!-- Блок с главными кнопками на странице -->
  <div class="button-container">
    <button class="btn-primary">Создать новую таблицу</button>
    <!-- Измененная вторая кнопка -->
    <button id="openModalBtn" class="btn-secondary">Просмотреть таблицы</button>
  </div>

  <!-- Модальное окно (всплывающий список созданных таблиц) -->
  <div id="tablesModal" class="modal">
    <div class="modal-content">
      
      <div class="modal-header">
        <h2>Созданные таблицы</h2>
        <span class="close-button">&times;</span>
      </div>
      
      <!-- Список таблиц со скроллом -->
      <div class="tables-list">
        
        <!-- Вместо href="/tables/..." впишите реальные ссылки переходов на страницы таблиц -->
        <div class="table-item">
          <span class="table-name">Таблица 1</span>
          <a href="/tables/1" class="btn-view">Просмотреть</a>
        </div>
        
        <div class="table-item">
          <span class="table-name">Таблица 2</span>
          <a href="/tables/2" class="btn-view">Просмотреть</a>
        </div>
        
        <div class="table-item">
          <span class="table-name">Таблица 3</span>
          <a href="/tables/3" class="btn-view">Просмотреть</a>
        </div>

        <div class="table-item">
          <span class="table-name">Таблица 4</span>
          <a href="/tables/4" class="btn-view">Просмотреть</a>
        </div>

        <div class="table-item">
          <span class="table-name">Таблица 5</span>
          <a href="/tables/5" class="btn-view">Просмотреть</a>
        </div>

        <div class="table-item">
          <span class="table-name">Таблица 6</span>
          <a href="/tables/6" class="btn-view">Просмотреть</a>
        </div>
        
      </div>
    </div>
  </div>

  <!-- Логика работы модального окна -->
  <script>
    const modal = document.getElementById("tablesModal");
    const openBtn = document.getElementById("openModalBtn");
    const closeBtn = document.querySelector(".close-button");

    // 1. Открытие модального окна
    openBtn.onclick = function() {
      modal.style.display = "block";
      document.body.style.overflow = "hidden"; // Запрещаем прокрутку фона
    }

    // 2. Закрытие при клике на крестик
    closeBtn.onclick = function() {
      modal.style.display = "none";
      document.body.style.overflow = "auto";  // Возвращаем прокрутку фона
    }

    // 3. Закрытие при клике в пустую область вне окна
    window.onclick = function(event) {
      if (event.target == modal) {
        modal.style.display = "none";
        document.body.style.overflow = "auto";
      }
    }
  </script>

</body>
</html>
